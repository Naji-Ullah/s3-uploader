name: s3-uploader-backend

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./:/app
      - backend-node-modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    networks:
      - app-network

  database:
    image: postgres:16
    env_file:
      - ./.env
    ports:
      - "55432:5432"
    volumes:
      - ./data-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-node-modules:
